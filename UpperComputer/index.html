<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="STM32G474 Signal Generator & Oscilloscope – Web-based control panel">
    <title>Signal Processor – STM32G474 信号源 & 示波器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<!-- ═══════════════ Top Bar ═══════════════ -->
<header id="topbar">
    <div class="topbar-left">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M2 12 Q6 4 10 12 Q14 20 18 12 Q20 8 22 12" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <defs><linearGradient id="g1" x1="0" y1="0" x2="24" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset="1" stop-color="#7b61ff"/></linearGradient></defs>
            </svg>
            <span>Signal Processor</span>
        </div>
    </div>
    <div class="topbar-center">
        <button id="btn-connect" class="btn btn-primary">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">连接串口</span>
        </button>
        <select id="baud-select" class="select-mini" title="波特率">
            <option value="115200">115200</option>
            <option value="921600">921600</option>
            <option value="2000000" selected>2000000</option>
        </select>
    </div>
    <div class="topbar-right">
        <span id="ack-display" class="mono">ACK --</span>
        <span id="fps-display" class="mono">0 FPS</span>
    </div>
</header>

<!-- ═══════════════ Main Layout ═══════════════ -->
<main id="app">
    <!-- ─── Oscilloscope Panel ─── -->
    <section id="osc-panel" class="panel">
        <div id="osc-screen">
            <canvas id="osc-canvas"></canvas>
            <div id="osc-overlay">
                <span id="osc-info-tl" class="osc-info mono"></span>
                <span id="osc-info-tr" class="osc-info mono"></span>
            </div>
        </div>
        <!-- Measurement Bar -->
        <div id="measure-bar">
            <div class="measure-item"><span class="measure-label">Freq</span><span id="m-freq" class="measure-val mono">-- Hz</span></div>
            <div class="measure-item"><span class="measure-label">Vpp</span><span id="m-vpp" class="measure-val mono">-- V</span></div>
            <div class="measure-item"><span class="measure-label">Vmax</span><span id="m-vmax" class="measure-val mono">-- V</span></div>
            <div class="measure-item"><span class="measure-label">Vmin</span><span id="m-vmin" class="measure-val mono">-- V</span></div>
            <div class="measure-item"><span class="measure-label">Vavg</span><span id="m-vavg" class="measure-val mono">-- V</span></div>
        </div>
    </section>

    <!-- ─── Control Sidebar ─── -->
    <aside id="controls">
        <!-- Signal Generator Card -->
        <div class="card" id="siggen-card">
            <h2 class="card-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M2 12 Q6 4 10 12 Q14 20 18 12" stroke="#007aff" stroke-width="2" stroke-linecap="round"/></svg>
                信号发生器
            </h2>
            <div class="control-group">
                <label>波形</label>
                <div id="wave-btns" class="btn-group">
                    <button class="btn-wave active" data-wave="0" title="正弦波">∿</button>
                    <button class="btn-wave" data-wave="1" title="方波">⊓</button>
                    <button class="btn-wave" data-wave="2" title="三角波">△</button>
                    <button class="btn-wave" data-wave="3" title="锯齿波">╱</button>
                </div>
            </div>
            <div class="control-group">
                <label>频率</label>
                <div class="input-row">
                    <input type="number" id="sig-freq" class="input-field mono" value="1000" min="1" max="5000" step="1">
                    <span class="unit">Hz</span>
                </div>
                <input type="range" id="sig-freq-slider" class="slider slider-orange" min="1" max="5000" value="1000">
            </div>
            <div class="control-group">
                <label>幅度</label>
                <div class="input-row">
                    <input type="number" id="sig-amp" class="input-field mono" value="3300" min="0" max="3300" step="10">
                    <span class="unit">mV</span>
                </div>
                <input type="range" id="sig-amp-slider" class="slider slider-orange" min="0" max="3300" value="3300">
            </div>
            <div class="control-group">
                <button id="btn-sig-toggle" class="btn btn-start">▶ 启动信号源</button>
            </div>
        </div>

        <!-- Oscilloscope Control Card -->
        <div class="card" id="osc-card">
            <h2 class="card-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="3" stroke="#5ac8fa" stroke-width="2"/><path d="M5 12 Q9 5 12 12 Q15 19 19 12" stroke="#5ac8fa" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
                示波器控制
            </h2>
            <div class="control-group">
                <label>采样率</label>
                <select id="osc-sps" class="select-field">
                    <option value="10000">10 kSPS</option>
                    <option value="20000">20 kSPS</option>
                    <option value="50000" selected>50 kSPS</option>
                </select>
            </div>
            <div class="control-group">
                <label>时基 (Time/div)</label>
                <select id="osc-timebase" class="select-field">
                    <option value="0.00001">10 µs</option>
                    <option value="0.00005">50 µs</option>
                    <option value="0.0001">100 µs</option>
                    <option value="0.0005">500 µs</option>
                    <option value="0.001" selected>1 ms</option>
                    <option value="0.005">5 ms</option>
                    <option value="0.01">10 ms</option>
                    <option value="0.05">50 ms</option>
                    <option value="0.1">100 ms</option>
                    <option value="0.2">200 ms</option>
                </select>
            </div>
            <div class="control-group">
                <label>电压量程 (V/div)</label>
                <select id="osc-vdiv" class="select-field">
                    <option value="0.1">100 mV</option>
                    <option value="0.2">200 mV</option>
                    <option value="0.5" selected>500 mV</option>
                    <option value="1.0">1 V</option>
                    <option value="2.0">2 V</option>
                </select>
            </div>
            <div class="control-group">
                <button id="btn-osc-toggle" class="btn btn-start btn-cyan">▶ 启动示波器</button>
            </div>
        </div>
    </aside>
</main>

<script src="app.js?v=11"></script>
</body>
</html>
